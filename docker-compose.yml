version: "3.8"

services:

  # -----------------------------
  # MongoDB
  # -----------------------------
  mongo:
    image: mongo:6
    container_name: mongo
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  # -----------------------------
  # Backend (Node + Express)
  # -----------------------------
  backend:
    build: ./backend
    container_name: backend
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/mydatabase
      - JWT_SECRET=myverysecurekey123
      - PORT=5000
    expose:
      - "5000"
    networks:
      - app-network

  # -----------------------------
  # Frontend (React)
  # -----------------------------
  frontend:
    build: ./frontend
    container_name: frontend
    depends_on:
      - backend
    expose:
      - "3000"
    networks:
      - app-network

  # -----------------------------
  # NGINX Reverse Proxy
  # -----------------------------
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network

  # -----------------------------
  # AI Agent (Python Service)
  # -----------------------------
  ai-agent:
    build: ./ai-agent
    container_name: ai-agent
    depends_on:
      - backend
    networks:
      - app-network

# -----------------------------
# Networks
# -----------------------------
networks:
  app-network:
    driver: bridge

# -----------------------------
# Volumes
# -----------------------------
volumes:
  mongo-data: